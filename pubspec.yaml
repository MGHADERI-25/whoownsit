name: whoownsit
description: Open-source Flutter app for transparent corporate ownership lookup using product barcodes.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/ownership/